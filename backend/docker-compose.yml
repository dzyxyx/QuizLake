services:

    #PostgreSQL
    postgres:
        image: postgres:16-alpine
        container_name: quizlake_db
        restart: unless-stopped
        environment:
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        ports:
            - "${POSTGRES_PORT}:5432"
        volumes:
            - quizlake_pg_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
            interval: 10s
            timeout: 5s
            retries: 5

    backend:
        build:
            context: .
        container_name: quizlake_backend
        restart: unless-stopped
        env_file:
            - .env
        environment:
            POSTGRES_HOST: postgres
            POSTGRES_PORT: 5432
        ports:
            - "8000:8000"
        depends_on:
            postgres:
                condition: service_healthy

    frontend:
        build:
            context: ../frontend
            args:
                VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
                VITE_WS_BASE_URL: ${VITE_WS_BASE_URL:-ws://localhost:8000/api/v1}
        container_name: quizlake_frontend
        restart: unless-stopped
        ports:
            - "80:80"
        depends_on:
            - backend

volumes:
    quizlake_pg_data:
